name: budgetmate
description: Budgeting app with Gmail integration — auto-sync transaksi dari email bank & e-wallet
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & networking
  dio: ^5.4.0

  # Storage
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # UI
  fl_chart: ^0.67.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0

  # Google Auth
  google_sign_in: ^6.2.1

  # OAuth deep link handling
  app_links: ^6.0.0
  url_launcher: ^6.3.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0

  # Utils
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
